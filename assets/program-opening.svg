<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">탐험대 임명식 진행 큐시트</title>
  <desc id="desc">빈 지도 공개, 보석팀 소개, 구호, 첫 단서 공개, 이동으로 이어지는 오프닝 순서</desc>
  <rect width="1200" height="560" fill="#fff8e9"/>
  <text x="600" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="850" fill="#2d2419">9-2. 탐험대 임명식 &amp; OT 큐시트</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
    <rect x="80" y="130" width="1040" height="90" rx="10" fill="#fff" stroke="#e6d8c4"/>
    <text x="115" y="166" font-size="22" font-weight="850" fill="#b9842b">00:00</text><text x="205" y="166" font-size="22" font-weight="850" fill="#2d2419">빈 지도 공개</text><text x="205" y="196" font-size="16" font-weight="750" fill="#6f6254">“아무것도 안 보여도 하나님이 숨겨두신 길은 있어요.”</text>
    <rect x="80" y="240" width="1040" height="90" rx="10" fill="#fff" stroke="#e6d8c4"/>
    <text x="115" y="276" font-size="22" font-weight="850" fill="#b9842b">03:00</text><text x="205" y="276" font-size="22" font-weight="850" fill="#2d2419">보석 수호대 소개</text><text x="205" y="306" font-size="16" font-weight="750" fill="#6f6254">루비 사랑 / 사파이어 말씀 / 에메랄드 생명 / 토파즈 소망</text>
    <rect x="80" y="350" width="1040" height="90" rx="10" fill="#fff" stroke="#e6d8c4"/>
    <text x="115" y="386" font-size="22" font-weight="850" fill="#b9842b">06:00</text><text x="205" y="386" font-size="22" font-weight="850" fill="#2d2419">구호 + 첫 단서</text><text x="205" y="416" font-size="16" font-weight="750" fill="#6f6254">“나는 하나님 보물!” → “빛나는 관문을 통과하라”</text>
    <rect x="80" y="460" width="1040" height="60" rx="10" fill="#276356"/>
    <text x="600" y="498" text-anchor="middle" font-size="21" font-weight="850" fill="#fff7dc">10분 안에 끝내고 팀별 선생님 인솔로 꿈아이홀 이동</text>
  </g>
</svg>
