<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">공간별 프로그램 흐름</title>
  <desc id="desc">교회 공간을 어떻게 활용하는지 보여주는 동선 그림</desc>
  <rect width="1200" height="560" fill="#fff8e9"/>
  <text x="600" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="800" fill="#2d2419">공간별 운영 흐름</text>
  <g fill="none" stroke="#b9842b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M210 170 H430"/>
    <path d="M555 170 H775"/>
    <path d="M905 195 C935 270 870 325 780 345"/>
    <path d="M650 365 H420"/>
    <path d="M292 388 C230 418 205 455 205 495"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" text-anchor="middle">
    <g transform="translate(70 120)">
      <rect width="220" height="100" rx="8" fill="#fff" stroke="#e6d8c4"/>
      <text x="110" y="42" font-size="22" font-weight="850" fill="#2d2419">임마누엘실</text>
      <text x="110" y="72" font-size="15" font-weight="750" fill="#6f6254">굿즈 / 여권 / 임명식</text>
    </g>
    <g transform="translate(430 120)">
      <rect width="220" height="100" rx="8" fill="#fff" stroke="#e6d8c4"/>
      <text x="110" y="42" font-size="22" font-weight="850" fill="#2d2419">꿈아이홀</text>
      <text x="110" y="72" font-size="15" font-weight="750" fill="#6f6254">버블쇼 / 말씀 / 기도회</text>
    </g>
    <g transform="translate(790 120)">
      <rect width="220" height="100" rx="8" fill="#fff" stroke="#e6d8c4"/>
      <text x="110" y="42" font-size="22" font-weight="850" fill="#2d2419">방별 순환</text>
      <text x="110" y="72" font-size="15" font-weight="750" fill="#6f6254">임마누엘실 / 유아실 / 비전홀</text>
    </g>
    <g transform="translate(650 310)">
      <rect width="260" height="100" rx="8" fill="#fff" stroke="#e6d8c4"/>
      <text x="130" y="42" font-size="22" font-weight="850" fill="#2d2419">물놀이존</text>
      <text x="130" y="72" font-size="15" font-weight="750" fill="#6f6254">보물섬 은혜의 바다</text>
    </g>
    <g transform="translate(310 310)">
      <rect width="260" height="100" rx="8" fill="#fff" stroke="#e6d8c4"/>
      <text x="130" y="42" font-size="22" font-weight="850" fill="#2d2419">지도 해독</text>
      <text x="130" y="72" font-size="15" font-weight="750" fill="#6f6254">팀 보석 / 완성 문장</text>
    </g>
    <g transform="translate(70 430)">
      <rect width="260" height="90" rx="8" fill="#fff" stroke="#e6d8c4"/>
      <text x="130" y="38" font-size="22" font-weight="850" fill="#2d2419">귀가 전 기도</text>
      <text x="130" y="66" font-size="15" font-weight="750" fill="#6f6254">보호자 축복기도 후 인계</text>
    </g>
