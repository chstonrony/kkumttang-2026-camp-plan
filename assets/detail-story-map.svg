<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">꿈땅 보물 탐험 전체 여정</title>
  <desc id="desc">임마누엘실에서 출발해 꿈아이홀, 방별 미션, 물놀이, 기도회, 주일 수료식으로 이어지는 여정 지도</desc>
  <rect width="1200" height="560" fill="#fff8e9"/>
  <path d="M78 398 C205 205, 350 260, 492 168 S770 95, 902 230 S1020 365, 1116 170" fill="none" stroke="#b9842b" stroke-width="14" stroke-linecap="round" stroke-dasharray="22 22"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" text-anchor="middle">
    <text x="600" y="62" font-size="34" font-weight="800" fill="#2d2419">찾았다! 하나님 보물! 전체 여정</text>
    <text x="600" y="102" font-size="18" font-weight="700" fill="#6f6254">교사와 스탭이 한눈에 보는 토요일-주일 흐름</text>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
    <g transform="translate(60 338)">
      <circle cx="58" cy="58" r="48" fill="#8f2f2f"/><text x="58" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">임마누엘실</text><text x="58" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#ffe9d6">굿즈/임명식</text>
    </g>
    <g transform="translate(240 210)">
      <circle cx="58" cy="58" r="48" fill="#2e8f9a"/><text x="58" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">꿈아이홀</text><text x="58" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#e9ffff">버블/말씀</text>
    </g>
    <g transform="translate(430 130)">
      <circle cx="58" cy="58" r="48" fill="#276356"/><text x="58" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">방별 미션</text><text x="58" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#dff5ea">나/친구/지도</text>
    </g>
    <g transform="translate(636 105)">
      <circle cx="58" cy="58" r="48" fill="#3763a8"/><text x="58" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">물놀이존</text><text x="58" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#e5efff">은혜의 바다</text>
    </g>
    <g transform="translate(823 250)">
      <circle cx="58" cy="58" r="48" fill="#b9842b"/><text x="58" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">기도회</text><text x="58" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#fff3d0">보호자 축복</text>
    </g>
    <g transform="translate(1030 120)">
      <circle cx="58" cy="58" r="48" fill="#6d4aa2"/><text x="58" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">주일</text><text x="58" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#f4edff">수료/보화</text>
    </g>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="18" font-weight="800" fill="#2d2419">
    <rect x="296" y="436" width="608" height="62" rx="8" fill="#fff" stroke="#e6d8c4"/>
    <text x="600" y="474" text-anchor="middle">마지막 발견: 예전에도, 지금도, 앞으로도 우리는 하나님 보물</text>
  </g>
</svg>
