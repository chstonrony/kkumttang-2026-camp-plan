<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">임마누엘실 나의 보석 동굴 진행법</title>
  <desc id="desc">이름 카드 찾기, 거울 보기, 고백하기, 여권 스티커 붙이기 순서</desc>
  <rect width="1200" height="560" fill="#fffaf0"/>
  <text x="600" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="850" fill="#2d2419">11. 임마누엘실: 나의 보석 동굴</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" text-anchor="middle">
    <rect x="90" y="150" width="240" height="220" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="210" y="210" font-size="24" font-weight="850" fill="#2d2419">이름 카드</text><text x="210" y="248" font-size="16" font-weight="750" fill="#6f6254">방 안에 쉽게 숨기기</text><text x="210" y="298" font-size="18" font-weight="850" fill="#b9842b">“하나님이 내 이름을 아세요”</text>
    <rect x="480" y="150" width="240" height="220" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="600" y="210" font-size="24" font-weight="850" fill="#2d2419">거울 보기</text><text x="600" y="248" font-size="16" font-weight="750" fill="#6f6254">한 명씩 밀지 않게</text><text x="600" y="298" font-size="18" font-weight="850" fill="#b9842b">“나는 하나님 보물”</text>
    <rect x="870" y="150" width="240" height="220" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="990" y="210" font-size="24" font-weight="850" fill="#2d2419">여권 스티커</text><text x="990" y="248" font-size="16" font-weight="750" fill="#6f6254">성공 경험 남기기</text><text x="990" y="298" font-size="18" font-weight="850" fill="#b9842b">나의 보석 획득</text>
  </g>
  <text x="600" y="455" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="22" font-weight="850" fill="#276356">난이도 기준: 4세도 교사 도움으로 2분 안에 이름을 찾게 세팅</text>
</svg>
