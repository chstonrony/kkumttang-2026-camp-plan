<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">버블쇼 운영 배치도</title>
  <desc id="desc">꿈아이홀 버블쇼에서 대기선, 공연 공간, 안전 담당, 메시지 연결 위치를 보여주는 그림</desc>
  <rect width="1200" height="560" fill="#f5fbfb"/>
  <text x="600" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="850" fill="#2d2419">9-3. 버블쇼 “빛나는 관문” 운영 배치</text>
  <rect x="110" y="125" width="980" height="330" rx="12" fill="#fff" stroke="#cfe3e3" stroke-width="4"/>
  <rect x="175" y="180" width="470" height="210" rx="12" fill="#e8f8f8" stroke="#2e8f9a" stroke-width="5"/>
  <text x="410" y="275" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="30" font-weight="850" fill="#276356">버블 공연 공간</text>
  <text x="410" y="315" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="750" fill="#6f6254">바닥 보호 / 미끄럼 방지 / 전선 고정</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" text-anchor="middle">
    <rect x="720" y="165" width="300" height="54" rx="8" fill="#fff8e9" stroke="#e6d8c4"/><text x="870" y="199" font-size="18" font-weight="850" fill="#2d2419">아이 대기선</text>
    <rect x="720" y="245" width="300" height="54" rx="8" fill="#fff8e9" stroke="#e6d8c4"/><text x="870" y="279" font-size="18" font-weight="850" fill="#2d2419">조 담당 교사 사이사이 착석</text>
    <rect x="720" y="325" width="300" height="54" rx="8" fill="#fff8e9" stroke="#e6d8c4"/><text x="870" y="359" font-size="18" font-weight="850" fill="#2d2419">마무리 메시지 연결</text>
  </g>
  <rect x="240" y="472" width="720" height="54" rx="10" fill="#276356"/>
  <text x="600" y="506" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="20" font-weight="850" fill="#fff">핵심 멘트: “방울이 모두 다르게 빛나듯 너희도 다르게 빛나요.”</text>
</svg>
