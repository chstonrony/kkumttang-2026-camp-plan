<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">물놀이존 코너 운영도</title>
  <desc id="desc">보물 건지기, 스펀지 릴레이, 물풍선 보석 배달, 안전 담당 위치를 보여주는 물놀이 운영도</desc>
  <rect width="1200" height="560" fill="#f4fbff"/>
  <text x="600" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="850" fill="#2d2419">14. 물놀이존: 보물섬 은혜의 바다</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" text-anchor="middle">
    <rect x="80" y="145" width="290" height="210" rx="10" fill="#fff" stroke="#cfe3f5"/><text x="225" y="200" font-size="24" font-weight="850" fill="#2d2419">코너 A</text><text x="225" y="238" font-size="21" font-weight="850" fill="#2e8f9a">보물 건지기</text><text x="225" y="278" font-size="16" font-weight="750" fill="#6f6254">뜰채 / 보석 / 말씀 캡슐</text>
    <rect x="455" y="145" width="290" height="210" rx="10" fill="#fff" stroke="#cfe3f5"/><text x="600" y="200" font-size="24" font-weight="850" fill="#2d2419">코너 B</text><text x="600" y="238" font-size="21" font-weight="850" fill="#2e8f9a">스펀지 릴레이</text><text x="600" y="278" font-size="16" font-weight="750" fill="#6f6254">물통 / 스펀지 / 목표선</text>
    <rect x="830" y="145" width="290" height="210" rx="10" fill="#fff" stroke="#cfe3f5"/><text x="975" y="200" font-size="24" font-weight="850" fill="#2d2419">코너 C</text><text x="975" y="238" font-size="21" font-weight="850" fill="#2e8f9a">물풍선 배달</text><text x="975" y="278" font-size="16" font-weight="750" fill="#6f6254">둘이 수건 잡고 이동</text>
  </g>
  <rect x="175" y="420" width="850" height="62" rx="10" fill="#276356"/>
  <text x="600" y="459" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="21" font-weight="850" fill="#fff">안전 담당 1명은 진행하지 않고 전체만 봅니다: 뛰기 / 미끄럼 / 추위 / 얼굴 물뿌리기 확인</text>
</svg>
