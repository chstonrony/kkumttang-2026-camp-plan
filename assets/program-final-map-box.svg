<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">보물지도 최종 해독과 보물상자 꾸미기 진행법</title>
  <desc id="desc">단서 카드, 팀 보석, 완성 문장, 보물상자 꾸미기로 이어지는 오후 마무리 활동</desc>
  <rect width="1200" height="560" fill="#fff8e9"/>
  <text x="600" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="850" fill="#2d2419">15. 보물지도 최종 해독 &amp; 보물상자</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" text-anchor="middle">
    <rect x="80" y="150" width="240" height="210" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="200" y="206" font-size="23" font-weight="850" fill="#2d2419">단서 모으기</text><text x="200" y="245" font-size="16" font-weight="750" fill="#6f6254">방별 카드 꺼내기</text>
    <rect x="350" y="150" width="240" height="210" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="470" y="206" font-size="23" font-weight="850" fill="#2d2419">팀 보석 붙이기</text><text x="470" y="245" font-size="16" font-weight="750" fill="#6f6254">루비/사파이어/에메랄드/토파즈</text>
    <rect x="620" y="150" width="240" height="210" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="740" y="206" font-size="23" font-weight="850" fill="#2d2419">완성 문장</text><text x="740" y="245" font-size="16" font-weight="750" fill="#6f6254">예전에도 지금도 앞으로도</text>
    <rect x="890" y="150" width="240" height="210" rx="10" fill="#fff" stroke="#e6d8c4"/><text x="1010" y="206" font-size="23" font-weight="850" fill="#2d2419">보물상자</text><text x="1010" y="245" font-size="16" font-weight="750" fill="#6f6254">내 이름 카드 넣기</text>
  </g>
  <rect x="190" y="420" width="820" height="62" rx="10" fill="#b9842b"/>
  <text x="600" y="459" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="21" font-weight="850" fill="#fff">진행자 결론: “찾고 보니, 하나님께서 숨겨두신 보물은 우리였어요.”</text>
</svg>
